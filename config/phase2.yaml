# Phase 2: Cross-Attention Fusion Training Config
model_type: "cross_attn"  # c1_2d | c2_3d | cross_attn

data:
  root: "data/nuscenes"
  min_lidar_pts: 10
  num_points: 256
  crop_size: 128
  noise_center: 0.3
  noise_size: 0.15
  noise_yaw_deg: 5.0
  match_max_dist_px: 80
  val_scene_ids: 2

detector_path: "models/yolov8s-seg.onnx"

d_model: 256
n_heads: 8
num_layers: 1
dropout: 0.1

sa_configs:
  - {npoint: 32, radius: 0.3, nsample: 64, mlp: [32, 32, 64]}
  - {npoint: 16, radius: 0.7, nsample: 32, mlp: [64, 128, 128]}
  - {npoint: 8,  radius: 1.5, nsample: 16, mlp: [128, 256, 256]}

training:
  epochs: 30
  batch_size: 16
  lr: 0.0005
  weight_decay: 0.0001
  num_workers: 2
  save_dir: "checkpoints_phase2"
  device: "auto"

loss:
  center_weight: 1.0
  size_weight: 2.0
  yaw_weight: 1.5
